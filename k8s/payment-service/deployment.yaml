apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: microservices

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service
        image: payment-service:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 3000