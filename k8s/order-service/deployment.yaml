apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices

spec:
  replicas: 2

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"

    spec:
      containers:
      - name: order-service
        image: order-service:latest

        imagePullPolicy: Never

        ports:
        - containerPort: 3000
