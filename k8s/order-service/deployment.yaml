apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices

spec:
  replicas: 1

  selector:
    matchLabels:
      app: order-service

  template:
    metadata:
      labels:
        app: order-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"

    spec:
      containers:
      - name: order-service
        image: order-service:latest

        imagePullPolicy: Never

        env:
        - name: NODE_OPTIONS
          value: "--require @opentelemetry/auto-instrumentations-node/register"
        - name: OTEL_SERVICE_NAME
          value: order-service
        - name: OTEL_TRACES_EXPORTER
          value: otlp
        - name: OTEL_METRICS_EXPORTER
          value: none
        - name: OTEL_LOGS_EXPORTER
          value: none
        - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: http://alloy.monitoring.svc.cluster.local:4318/v1/traces
        - name: USER_SERVICE_URL
          value: http://user-service.microservices.svc.cluster.local
        - name: PAYMENT_SERVICE_URL
          value: http://payment-service.microservices.svc.cluster.local
        - name: NOTIFICATION_SERVICE_URL
          value: http://notification-service.microservices.svc.cluster.local

        ports:
        - containerPort: 3000
