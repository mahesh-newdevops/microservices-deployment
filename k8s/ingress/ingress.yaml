apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: microservices-api-ingress
  namespace: microservices

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:

  ingressClassName: nginx

  rules:

  - host: microservices.local

    http:

      paths:

      - path: /users(/|$)(.*)
        pathType: ImplementationSpecific

        backend:
          service:
            name: user-service

            port:
              number: 80

      - path: /orders(/|$)(.*)
        pathType: ImplementationSpecific

        backend:
          service:
            name: order-service

            port:
              number: 80

      - path: /payments(/|$)(.*)
        pathType: ImplementationSpecific

        backend:
          service:
            name: payment-service

            port:
              number: 80

      - path: /notifications(/|$)(.*)
        pathType: ImplementationSpecific

        backend:
          service:
            name: notification-service

            port:
              number: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: microservices-frontend-ingress
  namespace: microservices

spec:

  ingressClassName: nginx

  rules:

  - host: microservices.local

    http:

      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend

            port:
              number: 80
