apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: microservices-ingress
  namespace: microservices

spec:

  ingressClassName: nginx

  rules:

  - host: microservices.local

    http:

      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend
            port:
              number: 80

      - path: /users
        pathType: Prefix

        backend:
          service:
            name: user-service
            port:
              number: 3000

      - path: /orders
        pathType: Prefix

        backend:
          service:
            name: order-service
            port:
              number: 3000

      - path: /payments
        pathType: Prefix

        backend:
          service:
            name: payment-service
            port:
              number: 3000

      - path: /notifications
        pathType: Prefix

        backend:
          service:
            name: notification-service
            port:
              number: 3000
