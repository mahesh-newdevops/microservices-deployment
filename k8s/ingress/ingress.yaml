apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: microservices

spec:
  ingressClassName: nginx

  rules:
  - host: app.local

    http:
      paths:

      - path: /
        pathType: Prefix

        backend:
          service:
            name: frontend
            port:
              number: 80

      - path: /users
        pathType: Prefix

        backend:
          service:
            name: user-service
            port:
              number: 80

      - path: /orders
        pathType: Prefix

        backend:
          service:
            name: order-service
            port:
              number: 80

      - path: /payments
        pathType: Pre