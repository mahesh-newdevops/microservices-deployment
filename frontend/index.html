<!DOCTYPE html>
<html>
<head>
  <title>Microservices Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f6f7f9;
      color: #17202a;
    }

    body {
      margin: 0;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0 0 24px;
      color: #53616f;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    section {
      background: #ffffff;
      border: 1px solid #dfe5eb;
      border-radius: 8px;
      padding: 16px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 10px;
      border: 1px solid #b9c3cf;
      border-radius: 6px;
      font: inherit;
    }

    button {
      margin-top: 14px;
      padding: 10px 14px;
      border: 0;
      border-radius: 6px;
      background: #1769aa;
      color: #ffffff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    pre {
      overflow: auto;
      min-height: 160px;
      margin: 16px 0 0;
      padding: 12px;
      border-radius: 6px;
      background: #101820;
      color: #e7eef6;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main>
    <h1>Microservices Demo</h1>
    <p class="subtitle">Create a user, then create an order to trigger payment and notification service calls.</p>

    <div class="grid">
      <section>
        <h2>Add User</h2>
        <form id="user-form">
          <label for="user-name">Name</label>
          <input id="user-name" name="name" value="Anaya" required>

          <label for="user-email">Email</label>
          <input id="user-email" name="email" type="email" value="anaya@example.com" required>

          <button type="submit">Create User</button>
        </form>
      </section>

      <section>
        <h2>Create Order</h2>
        <form id="order-form">
          <label for="order-user-id">User ID</label>
          <input id="order-user-id" name="userId" value="1" required>

          <label for="order-item">Item</label>
          <input id="order-item" name="item" value="minikube-checkout" required>

          <label for="order-amount">Amount</label>
          <input id="order-amount" name="amount" type="number" min="1" step="0.01" value="49.99" required>

          <button type="submit">Create Order</button>
        </form>
      </section>
    </div>

    <section style="margin-top: 16px;">
      <h2>Response</h2>
      <button id="refresh">Refresh Data</button>
      <pre id="output">Ready.</pre>
    </section>
  </main>

  <script>
    const output = document.getElementById('output')

    async function request(path, options) {
      const response = await fetch(path, options)
      const body = await response.json()

      if (!response.ok) {
        throw new Error(JSON.stringify(body, null, 2))
      }

      return body
    }

    function show(data) {
      output.textContent = JSON.stringify(data, null, 2)
    }

    document.getElementById('user-form').addEventListener('submit', async (event) => {
      event.preventDefault()
      const form = new FormData(event.target)
      const user = await request('/users/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.fromEntries(form))
      })
      document.getElementById('order-user-id').value = user.id
      show(user)
    })

    document.getElementById('order-form').addEventListener('submit', async (event) => {
      event.preventDefault()
      const form = new FormData(event.target)
      show(await request('/orders/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(Object.fromEntries(form))
      }))
    })

    document.getElementById('refresh').addEventListener('click', async () => {
      const [users, orders, payments, notifications] = await Promise.all([
        request('/users/users'),
        request('/orders/orders'),
        request('/payments/payments'),
        request('/notifications/notifications')
      ])
      show({ users, orders, payments, notifications })
    })
  </script>
</body>
</html>
